    <main class="app-main app-main--flat-wb gearmotor-db-main">
      <div class="panel gearmotor-db">
        <header class="gearmotor-db__head">
          <p class="flat-sidebar__eyebrow">MechAssist</p>
          <h1 class="flat-sidebar__title" id="gmPageTitle">Mis motorreductores</h1>
          <p class="flat-sidebar__lead muted" id="gmPageLead"></p>
          <div id="gmStatusHost" class="gearmotor-db__status-host" aria-live="polite"></div>
        </header>

        <div class="gearmotor-db__grid">
          <div class="gearmotor-db__col gearmotor-db__col--form">
            <section class="gearmotor-db__section" aria-labelledby="gmFormHeading">
              <h2 id="gmFormHeading" class="gearmotor-db__h2"></h2>
              <form id="gmForm" class="field-grid field-grid--essential gearmotor-db__form-grid">
                <input type="hidden" id="gmEditId" value="" />
                <div class="field" style="grid-column: 1 / -1">
                  <label for="gmLabel" id="gmLabelLbl"></label>
                  <input id="gmLabel" type="text" maxlength="160" autocomplete="off" placeholder="" />
                  <span class="field-hint" id="gmLabelHint"></span>
                </div>
                <div class="field" style="grid-column: 1 / -1">
                  <label for="gmBrand" id="gmBrandLbl"></label>
                  <select id="gmBrand">
                    <option value=""></option>
                  </select>
                  <span class="field-hint" id="gmBrandHint"></span>
                </div>
                <div class="field">
                  <label for="gmMotorKw" id="gmMotorKwLbl"></label>
                  <input id="gmMotorKw" type="number" step="any" min="0.01" required />
                </div>
                <div class="field">
                  <label for="gmN2" id="gmN2Lbl"></label>
                  <input id="gmN2" type="number" step="any" min="0.01" required />
                </div>
                <div class="field">
                  <label for="gmT2" id="gmT2Lbl"></label>
                  <input id="gmT2" type="number" step="any" min="0.01" required />
                </div>
                <div class="field">
                  <label for="gmT2peak" id="gmT2peakLbl"></label>
                  <input id="gmT2peak" type="number" step="any" min="0" />
                  <span class="field-hint" id="gmT2peakHint"></span>
                </div>
                <div class="field">
                  <label for="gmNmotor" id="gmNmotorLbl"></label>
                  <input id="gmNmotor" type="number" step="1" min="1" placeholder="1400" />
                  <span class="field-hint" id="gmNmotorHint"></span>
                </div>
                <div class="field">
                  <label for="gmEta" id="gmEtaLbl"></label>
                  <input id="gmEta" type="number" step="0.01" min="0.5" max="1" placeholder="0.92" />
                  <span class="field-hint" id="gmEtaHint"></span>
                </div>
                <div class="field" style="grid-column: 1 / -1">
                  <label for="gmNotes" id="gmNotesLbl"></label>
                  <textarea id="gmNotes" rows="2" maxlength="500" autocomplete="off"></textarea>
                  <span class="field-hint" id="gmNotesHint"></span>
                </div>
                <div class="field gearmotor-db__form-actions" style="grid-column: 1 / -1">
                  <button type="submit" class="btn-calc" id="gmSubmitBtn"></button>
                  <button type="button" class="button button--ghost" id="gmCancelBtn" hidden></button>
                </div>
              </form>
            </section>
          </div>

          <div class="gearmotor-db__col gearmotor-db__col--list">
            <section class="gearmotor-db__section" aria-labelledby="gmListHeading">
              <div class="gearmotor-db__toolbar gearmotor-db__toolbar--cloud">
                <h2 id="gmListHeading" class="gearmotor-db__h2"></h2>
              </div>
              <p class="muted gearmotor-db__cloud-strip" id="gmCloudStrip" aria-live="polite"></p>
              <p class="muted" id="gmCount"></p>
              <div class="gearmotor-db__table-wrap">
                <table class="gearmotor-db__table" id="gmTable">
                  <thead>
                    <tr>
                      <th id="gmThRef">Ref.</th>
                      <th id="gmThPkW"><em>P</em> kW</th>
                      <th id="gmThN2">n<sub>2</sub></th>
                      <th id="gmThT2">T<sub>2</sub></th>
                      <th id="gmThAct">Acc.</th>
                    </tr>
                  </thead>
                  <tbody id="gmTableBody"></tbody>
                </table>
              </div>
              <p class="muted gearmotor-db__empty" id="gmEmpty" hidden></p>
            </section>
          </div>
