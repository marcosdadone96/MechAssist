<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="TheMechAssist">
  <defs>
    <linearGradient id="tma-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="tma-metal" x1="18%" y1="8%" x2="82%" y2="92%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="35%" stop-color="#cbd5e1"/>
      <stop offset="65%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="tma-metal-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="tma-blue" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="45%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="tma-inner-glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="rgba(56,189,248,0.35)"/>
      <stop offset="70%" stop-color="rgba(15,23,42,0)"/>
      <stop offset="100%" stop-color="rgba(15,23,42,0)"/>
    </radialGradient>
    <filter id="tma-soft" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>
  <!-- App tile -->
  <rect width="128" height="128" rx="28" fill="url(#tma-bg)"/>
  <!-- 12-tooth gear silhouette -->
  <path
    fill="url(#tma-metal)"
    filter="url(#tma-soft)"
    stroke="#1e293b"
    stroke-width="0.75"
    d="M 64.00 18.00 L 73.32 29.23 L 87.00 24.16 L 89.46 38.54 L 103.84 41.00 L 98.77 54.68 L 110.00 64.00 L 98.77 73.32 L 103.84 87.00 L 89.46 89.46 L 87.00 103.84 L 73.32 98.77 L 64.00 110.00 L 54.68 98.77 L 41.00 103.84 L 38.54 89.46 L 24.16 87.00 L 29.23 73.32 L 18.00 64.00 L 29.23 54.68 L 24.16 41.00 L 38.54 38.54 L 41.00 24.16 L 54.68 29.23 Z"
  />
  <!-- Central hub (bore + frames monogram) -->
  <circle cx="64" cy="64" r="27.5" fill="#020617"/>
  <circle cx="64" cy="64" r="27.5" fill="url(#tma-inner-glow)"/>
  <!-- M -->
  <path
    fill="url(#tma-metal-dark)"
    d="M 46 86 L 46 46 L 54 46 L 64 62 L 74 46 L 82 46 L 82 86 L 76 86 L 76 56 L 64 72 L 52 56 L 52 86 Z"
  />
  <!-- A (with counter) -->
  <path
    fill="url(#tma-metal-dark)"
    d="M 58.5 84 L 64 54 L 69.5 84 Z M 62.4 78 L 64 62.8 L 65.6 78 Z"
    fill-rule="evenodd"
  />
  <rect x="59.5" y="67.2" width="9" height="4.2" rx="1" fill="url(#tma-blue)"/>
</svg>
